[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Using sirv via the Dockerfile CMD instead of overriding it here.
# Railway will default to the CMD in the Dockerfile if startCommand is removed.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[healthcheck]
path = "/"
timeout = 100
interval = 60

[service]
name = "sanity-studio"
